# custom_botsort.yaml
# BoT-SORT tracker configuration
# Adapted for 10-second track retention (300 frames at 30 fps)

tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 300  # 10s at 30 fps
match_thresh: 0.8
fuse_score: True

# BoT-SORT specifics
gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
model: auto
